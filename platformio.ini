[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    adafruit/Adafruit BME280 Library @ ^2.2.2
    adafruit/RTClib @ ^2.1.1
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.5
    arduino-libraries/SD @ ^1.2.4
    alvesoaj/eFLL @ ^1.4.1
